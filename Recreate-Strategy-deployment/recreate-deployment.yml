apiVersion: apps/v1
kind: Deployment
metadata: 
  name: recreate-deploy
  namespace: recreate
  labels:
    app: nginx
spec: 
  replicas: 4
  strategy: 
    type: Recreate
  selector: 
    matchLabels:
      app: nginx
  
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
      - image: nginx:latest
        name: nginx
        ports: 
        - containerPort: 80


---

apiVersion: v1
kind: Service
metadata:
  namespace: recreate
  name: recreate-svc
spec:
  selector: 
    app: nginx
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30000 


  
