<!DOCTYPE html>
<html>
<head>
    <title>NGINX Version 1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255,255,255,0.1);
            padding: 50px;
            border-radius: 15px;
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        h1 {
            font-size: 60px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 35px;
            margin-bottom: 20px;
        }

        .version {
            font-size: 28px;
            color: #ffd700;
            font-weight: bold;
        }

        .footer {
            margin-top: 25px;
            font-size: 18px;
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Welcome to NGINX</h1>
    <h2>Blue Environment</h2>

    <div class="version">
        Version 1
    </div>

    <div class="footer">
        Powered by Kubernetes Deployment Strategies Demo
    </div>
</div>

</body>
</html>
