apiVersion: apps/v1
kind: Deployment
metadata:
  name: rolling-deployment
  namespace: rolling
  labels:
    app: nginx
spec:
  replicas: 4
  strategy: 
    type: RollingUpdate
    rollingUpdate: 
      maxUnavailable: 1
      maxSurge: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: nginx:latest
          ports:
            - containerPort: 80

---


apiVersion: v1
kind: Service
metadata: 
  name: rolling-svc
  namespace: rolling
spec:
  selector:
    app: nginx
  type: NodePort
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30001



    

