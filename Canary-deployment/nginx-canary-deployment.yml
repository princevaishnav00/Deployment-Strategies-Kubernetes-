apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-canary-deployment
  namespace: canary
  labels:
    app: nginx
    version: stable

spec:
  replicas: 4

  selector:
    matchLabels:
      app: nginx
      version: stable


  template:
    metadata:
      labels:
        app: nginx
        version: stable

    spec:
      containers:
      - name: nginx-canary-cotainer
        image: nginx:latest
        ports:
        - containerPort: 80
